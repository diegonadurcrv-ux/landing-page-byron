<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="font-main">
    <!-- HEADER-->
    <header class="flex justify-between items-center px-8 py-9 bg-black text-white">
        <div class="flex items-center gap-4">
            <div class="size-12"> <!-- nao é recomendado aplicar tamanhos diretos nas imagens-->
                <img src="./img/icon_logo.png" alt="Logo do Site" />
            </div>
            <h1 class="text-4xl">Portfólio</h1>
        </div>
        <div class="size-8">
            <img src="./img/icon_hamburguer.png" alt="Icon hamburguer" />
        </div>
    </header>
    <!-- HERO -->
    <section class="text-black px-6 py-16 bg-white">
        <div class="max-w-100 max-h-100">
            <img src="./img/sally.png" alt="imagem da sally: mascote da byron.solutions">
        </div>
        <div class="flex flex-col gap-12">
            <div class="text-center flex flex-col gap-8 items-center">
                <div class="flex flex-col gap-8">
                    <h2 class="text-5xl">Conheça a <span class="text-secundary">Sally</span></h2>
                    <div class="flex flex-col gap-4">
                        <h3 class="text-2xl">A mascote da <span class="text-secundary">byron.solutions</span></h3>
                        <p class="text-base">
                            Lorem ipsum dolor sit amet consectetur, adipisicing elit. 
                            Quibusdam dolore id incidunt vitae doloremque accusamus exercitationem 
                            reprehenderit facilis quae iure.
                        </p>
                    </div>
                </div>
                <button class="text-2xl font-semibold text-white bg-main px-4 py-2 rounded-2xl hover:bg-teal-600 transition duration-200">SAIBA MAIS</button>
            </div>
            <div class="flex justify-between items-center">
                <p class="text-2xl">Nos Contate!</p>
                <div class="flex gap-6">
                    <div class="size-12">
                        <a href="#instagram"><img src="./img/icon_instagram.png" alt=""></a>
                    </div>
                    <div class="size-12">
                        <a href="#linkedin"><img src="./img/icon_linkedin.png" alt=""></a>
                    </div>
                    <div class="size-12">
                        <a href="#whatsapp"><img src="./img/icon_whatsapp.png" alt=""></a>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
